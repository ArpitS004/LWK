kind = "web"
previewPath = "/"
title = "LWK"
version = "1.0.0"
id = "artifacts/lwk"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26269

[services.development]
run = "pnpm --filter @workspace/lwk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lwk", "run", "build" ]
serve = "static"
publicDir = "artifacts/lwk/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26269"
BASE_PATH = "/"
